name: Metrics

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "README.md"
      - ".github/workflows/metrics.yml"

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest

    steps:
      - name: Profile overview
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/profile-overview.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rasel9t6
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Dhaka
          config_animations: yes
          repositories_forks: no
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugins_errors_fatal: yes

      - name: Languages
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rasel9t6
          template: classic
          base: ""
          config_timezone: Asia/Dhaka
          config_animations: yes
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 8
          plugin_languages_other: yes
          plugins_errors_fatal: yes

      - name: Contributions calendar
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/contributions.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: rasel9t6
          template: classic
          base: ""
          config_timezone: Asia/Dhaka
          config_animations: yes
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugins_errors_fatal: yes

      - name: The Go Engineer repository metrics
        uses: lowlighter/metrics@latest
        with:
          filename: metrics/the-go-engineer.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: swe-labs
          repo: the-go-engineer
          template: repository
          base: header, metadata
          config_timezone: Asia/Dhaka
          config_animations: yes

          # Repository language breakdown
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          plugin_languages_limit: 6

          # Issues / pull requests health
          plugin_followup: yes
          plugin_followup_sections: repositories

          # Star growth chart
          plugin_stargazers: yes
          plugin_stargazers_days: 60
          plugin_stargazers_charts_type: classic

          # Repository traffic/views
          # This requires METRICS_TOKEN to have traffic access to swe-labs/the-go-engineer.
          plugin_traffic: yes

          # Prevent committing ugly SVGs with visible "Unexpected error" blocks.
          plugins_errors_fatal: yes
